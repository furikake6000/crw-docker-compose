use_default_settings: true

general:
  instance_name: "crw-search"
  privacypolicy_url: false
  contact_url: false
  donation_url: false

search:
  safe_search: 0
  autocomplete: ""
  default_lang: "auto"
  # JSON format must be explicitly enabled — SearXNG returns 403 on
  # `?format=json` otherwise. The `html` entry is kept so the upstream
  # /search UI remains usable for debugging.
  formats:
    - html
    - json

server:
  # Required by SearXNG. The SEARXNG_SECRET_KEY env var on the container will
  # override this at startup via the upstream image's templating; the literal
  # below is only a fallback that lets the container boot in dev without env.
  # In production, generate one with `openssl rand -hex 32` and set it in `.env`.
  secret_key: "change-me-with-openssl-rand-hex-32-please"
  bind_address: "0.0.0.0"
  port: 8080
  # Rate limiting is handled by crw-server's own middleware, so SearXNG's
  # built-in limiter (which would require Valkey/Redis) stays off. This
  # also lets us drop the Valkey container — one less moving part.
  limiter: false
  public_instance: false
  image_proxy: false
  method: "GET"
